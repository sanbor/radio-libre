name: Release macOS

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build, sign, notarize, and release macOS (Mac Catalyst)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Xcode project
        run: |
          brew install xcodegen
          xcodegen generate

      - name: Install signing certificate
        env:
          CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          KEYCHAIN_PWD: ${{ secrets.KEYCHAIN_PWD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo -n "$CERTIFICATE" | base64 --decode -o "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$CERTIFICATE_PWD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Build macOS app (Mac Catalyst)
        run: |
          xcodebuild build \
            -scheme LibreRadio \
            -destination 'generic/platform=macOS,variant=Mac Catalyst' \
            -configuration Release \
            -derivedDataPath build/ \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            -quiet

      - name: Package app
        run: |
          APP_PATH="build/Build/Products/Release-maccatalyst/LibreRadio.app"
          ditto -c -k --keepParent "$APP_PATH" LibreRadio-macOS.zip

      - name: Notarize app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PWD: ${{ secrets.APPLE_ID_PWD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit LibreRadio-macOS.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PWD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

      - name: Staple notarization ticket
        run: |
          APP_PATH="build/Build/Products/Release-maccatalyst/LibreRadio.app"
          xcrun stapler staple "$APP_PATH"
          rm LibreRadio-macOS.zip
          ditto -c -k --keepParent "$APP_PATH" LibreRadio-macOS.zip

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            LibreRadio-macOS.zip \
            --title "LibreRadio ${{ github.ref_name }}" \
            --generate-notes

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" 2>/dev/null || true
