name: Release macOS

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-alpha.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-beta.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    name: Build, sign, notarize, and release macOS (Mac Catalyst)
    runs-on: macos-15
    environment: release

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Verify tag is on main branch
        run: |
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::Tag does not point to a commit on main — aborting release"
            exit 1
          fi

      - name: Generate Xcode project
        run: |
          HOMEBREW_NO_AUTO_UPDATE=1 brew install xcodegen
          xcodegen generate

      - name: Install signing certificate
        env:
          CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          KEYCHAIN_PWD: ${{ secrets.KEYCHAIN_PWD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          umask 077
          echo -n "$CERTIFICATE" | base64 --decode -o "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$CERTIFICATE_PWD" -f pkcs12 -k "$KEYCHAIN_PATH" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed -e 's/"//g')

      - name: Build macOS app (Mac Catalyst)
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild build \
            -scheme LibreRadio \
            -destination 'generic/platform=macOS,variant=Mac Catalyst' \
            -configuration Release \
            -derivedDataPath build/ \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            ENABLE_HARDENED_RUNTIME=YES \
            OTHER_CODE_SIGN_FLAGS="--timestamp" \
            -quiet

      - name: Verify code signature
        run: |
          APP_PATH="build/Build/Products/Release-maccatalyst/LibreRadio.app"
          codesign --verify --deep --strict "$APP_PATH"

      - name: Package app
        run: |
          APP_PATH="build/Build/Products/Release-maccatalyst/LibreRadio.app"
          ditto -c -k --keepParent "$APP_PATH" LibreRadio-macOS.zip

      - name: Notarize app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PWD: ${{ secrets.APPLE_ID_PWD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          SUBMIT_LOG="$RUNNER_TEMP/notarization.log"
          INFO_LOG="$RUNNER_TEMP/notarization-info.log"

          # Submit the artifact; do NOT use --wait, we poll ourselves so we
          # can tolerate transient network errors during the long poll phase.
          xcrun notarytool submit LibreRadio-macOS.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PWD" \
            --team-id "$APPLE_TEAM_ID" > "$SUBMIT_LOG" 2>&1
          SUBMIT_ID=$(awk '/^  id: / {print $2; exit}' "$SUBMIT_LOG")
          if [ -z "$SUBMIT_ID" ]; then
            echo "::error::Failed to obtain notarization submission id"
            grep -v -i "apple-id\|password" "$SUBMIT_LOG" || true
            exit 1
          fi
          echo "Notarization submission id: $SUBMIT_ID"

          # Poll until terminal status, tolerating transient network errors.
          STATUS=""
          CONSECUTIVE_FAILURES=0
          DEADLINE=$(( $(date +%s) + 1800 ))  # 30 minutes
          while [ "$(date +%s)" -lt "$DEADLINE" ]; do
            sleep 30
            if ! xcrun notarytool info "$SUBMIT_ID" \
                --apple-id "$APPLE_ID" \
                --password "$APPLE_ID_PWD" \
                --team-id "$APPLE_TEAM_ID" > "$INFO_LOG" 2>&1; then
              CONSECUTIVE_FAILURES=$(( CONSECUTIVE_FAILURES + 1 ))
              echo "notarytool info failed (consecutive failures: $CONSECUTIVE_FAILURES) — retrying"
              if [ "$CONSECUTIVE_FAILURES" -ge 5 ]; then
                echo "::error::Too many consecutive failures polling notarization status"
                grep -v -i "apple-id\|password" "$INFO_LOG" || true
                exit 1
              fi
              continue
            fi
            CONSECUTIVE_FAILURES=0
            STATUS=$(awk '/^  status: / {print $2; exit}' "$INFO_LOG")
            echo "Notarization status: $STATUS"
            case "$STATUS" in
              Accepted) break ;;
              Invalid|Rejected)
                echo "::error::Notarization was not accepted (status: $STATUS)"
                echo "--- Apple notary log for $SUBMIT_ID ---"
                xcrun notarytool log "$SUBMIT_ID" \
                  --apple-id "$APPLE_ID" \
                  --password "$APPLE_ID_PWD" \
                  --team-id "$APPLE_TEAM_ID" || true
                exit 1
                ;;
            esac
          done

          if [ "$STATUS" != "Accepted" ]; then
            echo "::error::Timed out waiting for notarization (last status: ${STATUS:-unknown})"
            exit 1
          fi

      - name: Staple notarization ticket
        run: |
          APP_PATH="build/Build/Products/Release-maccatalyst/LibreRadio.app"
          xcrun stapler staple "$APP_PATH"
          xcrun stapler validate "$APP_PATH"
          spctl --assess --type execute --verbose "$APP_PATH"
          rm LibreRadio-macOS.zip
          ditto -c -k --keepParent "$APP_PATH" LibreRadio-macOS.zip

      - name: Create DMG
        run: |
          APP_PATH="build/Build/Products/Release-maccatalyst/LibreRadio.app"
          hdiutil create -volname LibreRadio -srcfolder "$APP_PATH" \
            -ov -format UDZO LibreRadio-macOS.dmg

      - name: Sign DMG
        run: |
          codesign --force --sign "Developer ID Application" \
            --timestamp LibreRadio-macOS.dmg

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PWD: ${{ secrets.APPLE_ID_PWD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          DMG_LOG="$RUNNER_TEMP/dmg-notarization.log"
          DMG_INFO_LOG="$RUNNER_TEMP/dmg-notarization-info.log"

          # Submit the artifact; do NOT use --wait, we poll ourselves so we
          # can tolerate transient network errors during the long poll phase.
          xcrun notarytool submit LibreRadio-macOS.dmg \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_ID_PWD" \
            --team-id "$APPLE_TEAM_ID" > "$DMG_LOG" 2>&1
          DMG_SUBMIT_ID=$(awk '/^  id: / {print $2; exit}' "$DMG_LOG")
          if [ -z "$DMG_SUBMIT_ID" ]; then
            echo "::error::Failed to obtain DMG notarization submission id"
            grep -v -i "apple-id\|password" "$DMG_LOG" || true
            exit 1
          fi
          echo "DMG notarization submission id: $DMG_SUBMIT_ID"

          # Poll until terminal status, tolerating transient network errors.
          DMG_STATUS=""
          CONSECUTIVE_FAILURES=0
          DEADLINE=$(( $(date +%s) + 1800 ))  # 30 minutes
          while [ "$(date +%s)" -lt "$DEADLINE" ]; do
            sleep 30
            if ! xcrun notarytool info "$DMG_SUBMIT_ID" \
                --apple-id "$APPLE_ID" \
                --password "$APPLE_ID_PWD" \
                --team-id "$APPLE_TEAM_ID" > "$DMG_INFO_LOG" 2>&1; then
              CONSECUTIVE_FAILURES=$(( CONSECUTIVE_FAILURES + 1 ))
              echo "notarytool info failed (consecutive failures: $CONSECUTIVE_FAILURES) — retrying"
              if [ "$CONSECUTIVE_FAILURES" -ge 5 ]; then
                echo "::error::Too many consecutive failures polling DMG notarization status"
                grep -v -i "apple-id\|password" "$DMG_INFO_LOG" || true
                exit 1
              fi
              continue
            fi
            CONSECUTIVE_FAILURES=0
            DMG_STATUS=$(awk '/^  status: / {print $2; exit}' "$DMG_INFO_LOG")
            echo "DMG notarization status: $DMG_STATUS"
            case "$DMG_STATUS" in
              Accepted) break ;;
              Invalid|Rejected)
                echo "::error::DMG notarization was not accepted (status: $DMG_STATUS)"
                echo "--- Apple notary log for $DMG_SUBMIT_ID ---"
                xcrun notarytool log "$DMG_SUBMIT_ID" \
                  --apple-id "$APPLE_ID" \
                  --password "$APPLE_ID_PWD" \
                  --team-id "$APPLE_TEAM_ID" || true
                exit 1
                ;;
            esac
          done

          if [ "$DMG_STATUS" != "Accepted" ]; then
            echo "::error::Timed out waiting for DMG notarization (last status: ${DMG_STATUS:-unknown})"
            exit 1
          fi
          xcrun stapler staple LibreRadio-macOS.dmg
          xcrun stapler validate LibreRadio-macOS.dmg
          codesign --verify --deep --strict LibreRadio-macOS.dmg

      - name: Compute checksums
        run: |
          shasum -a 256 LibreRadio-macOS.zip > LibreRadio-macOS.zip.sha256
          shasum -a 256 LibreRadio-macOS.dmg > LibreRadio-macOS.dmg.sha256

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          PRERELEASE=""
          if [[ "$TAG_NAME" == *-beta.* || "$TAG_NAME" == *-rc.* || "$TAG_NAME" == *-alpha.* ]]; then
            PRERELEASE="--prerelease"
          fi
          gh release create "$TAG_NAME" \
            LibreRadio-macOS.zip \
            LibreRadio-macOS.zip.sha256 \
            LibreRadio-macOS.dmg \
            LibreRadio-macOS.dmg.sha256 \
            --title "LibreRadio $TAG_NAME" \
            --generate-notes \
            ${PRERELEASE:+"$PRERELEASE"}

      - name: Clean up keychain
        if: always()
        run: |
          rm -f "$RUNNER_TEMP/certificate.p12"
          rm -f "$RUNNER_TEMP/notarization.log" "$RUNNER_TEMP/notarization-info.log" \
                "$RUNNER_TEMP/dmg-notarization.log" "$RUNNER_TEMP/dmg-notarization-info.log"
          security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" 2>/dev/null || true
